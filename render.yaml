databases:
  - name: salary-management-db
    databaseName: salary_management
    user: salary_management
    plan: free

services:
  - type: web
    name: salary-management-api
    runtime: ruby
    plan: free
    rootDir: backend
    buildCommand: |
      bundle install
      bundle exec rails db:migrate
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /api/v1/employees/countries
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: salary-management-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: FRONTEND_URL
        sync: false
      - key: RAILS_MASTER_KEY
        sync: false
